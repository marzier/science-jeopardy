<!DOCTYPE html>
<html>
<head>
<title>Science Jeopardy – Game 1</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: #001f3f;
  color: white;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

/* Top-left and top-right buttons */
#backBtn, #resetBtn {
  position: absolute;
  top: 10px;
  font-size: 1.2vw;
  padding: 8px 15px;
  cursor: pointer;
  z-index: 200;
  font-weight: bold;
  color: white;
  background: #0033cc;
  border: 2px solid white;
  border-radius: 5px;
}

#backBtn { left: 10px; }
#resetBtn { right: 10px; }

/* Display team scores under title */
#teamScores {
  margin-top: 10px;
  margin-bottom: 10px;
  font-size: 22px;
}

/* Team selection overlay */
#teamSelect {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0033cc;
  color: #FFD700;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  z-index: 300;
}

#teamSelect button {
  font-size: 24px;
  margin: 10px;
  padding: 10px 20px;
}

/* Table styling */
table {
  border-collapse: collapse;
  border: 1px solid black;
  width: 90vw;
  height: 70vh;
  table-layout: fixed;
}

th, td {
  border: 1px solid black;
  text-transform: uppercase;
  text-align: center;
  vertical-align: middle;
  font-weight: bold;
}

/* Clue cells */
td, th {
  background: #0033cc;
}

td {
  color: #FF8C00;
  font-size: 3vw;
  cursor: pointer;
}

/* Full-screen clue overlay */
#question {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0033cc;
  color: #FFFFFF; /* clue color now white */
  font-size: 4vw;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* Team buttons and Show Answer button styling */
.team-buttons button, #showBtn {
  font-size: 2vw;
  margin: 5px;
  padding: 10px 20px;
  font-weight: bold;
  color: #FF8C00;
  background: #0033cc;
  border: 2px solid #FF8C00;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  transition: transform 0.1s;
}

.team-buttons button:active, #showBtn:active {
  transform: scale(0.95);
}

.team-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
  gap: 10px;
}
</style>
</head>
<body>

<h1>Science Jeopardy – Game 1</h1>
<button id="backBtn" onclick="window.location.href='index.html'">Back to Menu</button>
<button id="resetBtn" onclick="resetGame()">Reset Game</button>
<div id="teamScores"></div>

<!-- Team selection overlay -->
<div id="teamSelect">
  <div>Select Number of Teams</div>
  <div>
    <button onclick="startGame(2)">2 Teams</button>
    <button onclick="startGame(3)">3 Teams</button>
    <button onclick="startGame(4)">4 Teams</button>
    <button onclick="startGame(5)">5 Teams</button>
    <button onclick="startGame(6)">6 Teams</button>
  </div>
</div>

<table>
<tr>
  <th>ATOMS</th>
  <th>FORCES</th>
  <th>ENERGY</th>
  <th>WEATHER</th>
  <th>EARTH</th>
  <th>ENGINEERING</th>
</tr>

<tr>
<td value="100" onclick="ask(this,'q1',100)">$100</td>
<td value="100" onclick="ask(this,'q6',100)">$100</td>
<td value="100" onclick="ask(this,'q11',100)">$100</td>
<td value="100" onclick="ask(this,'q16',100)">$100</td>
<td value="100" onclick="ask(this,'q21',100)">$100</td>
<td value="100" onclick="ask(this,'q26',100)">$100</td>
</tr>

<tr>
<td value="200" onclick="ask(this,'q2',200)">$200</td>
<td value="200" onclick="ask(this,'q7',200)">$200</td>
<td value="200" onclick="ask(this,'q12',200)">$200</td>
<td value="200" onclick="ask(this,'q17',200)">$200</td>
<td value="200" onclick="ask(this,'q22',200)">$200</td>
<td value="200" onclick="ask(this,'q27',200)">$200</td>
</tr>

<tr>
<td value="300" onclick="ask(this,'q3',300)">$300</td>
<td value="300" onclick="ask(this,'q8',300)">$300</td>
<td value="300" onclick="ask(this,'q13',300)">$300</td>
<td value="300" onclick="ask(this,'q18',300)">$300</td>
<td value="300" onclick="ask(this,'q23',300)">$300</td>
<td value="300" onclick="ask(this,'q28',300)">$300</td>
</tr>

<tr>
<td value="400" onclick="ask(this,'q4',400)">$400</td>
<td value="400" onclick="ask(this,'q9',400)">$400</td>
<td value="400" onclick="ask(this,'q14',400)">$400</td>
<td value="400" onclick="ask(this,'q19',400)">$400</td>
<td value="400" onclick="ask(this,'q24',400)">$400</td>
<td value="400" onclick="ask(this,'q29',400)">$400</td>
</tr>

<tr>
<td value="500" onclick="ask(this,'q5',500)">$500</td>
<td value="500" onclick="ask(this,'q10',500)">$500</td>
<td value="500" onclick="ask(this,'q15',500)">$500</td>
<td value="500" onclick="ask(this,'q20',500)">$500</td>
<td value="500" onclick="ask(this,'q25',500)">$500</td>
<td value="500" onclick="ask(this,'q30',500)">$500</td>
</tr>
</table>

<div id="question"></div>

<script>
let teamNames = ["Curie", "Newton", "Darwin", "Einstein", "Tesla", "Galileo"];
let teams = [];
let currentValue = 0;
let answer = "";

// Questions
const q = {
q1:["Smallest unit of an element","Atom"],
q2:["Two or more atoms chemically bonded","Molecule"],
q3:["Substance made from two or more elements","Compound"],
q4:["Particles with negative charge","Electrons"],
q5:["Center of an atom containing protons and neutrons","Nucleus"],

q6:["Push or pull on an object","Force"],
q7:["Total force acting on an object","Net force"],
q8:["Force that pulls objects toward Earth","Gravity"],
q9:["Unit used to measure force","Newton"],
q10:["Mass times acceleration equals","Force"],

q11:["Energy stored due to position","Potential energy"],
q12:["Energy of motion","Kinetic energy"],
q13:["Heat transfer through direct contact","Conduction"],
q14:["Heat transfer through moving fluids","Convection"],
q15:["Heat transfer through electromagnetic waves","Radiation"],

q16:["Large body of air with similar temperature and humidity","Air mass"],
q17:["Weather patterns measured over many years","Climate"],
q18:["Instrument that measures air pressure","Barometer"],
q19:["Instrument that measures wind speed","Anemometer"],
q20:["Boundary between two air masses","Front"],

q21:["Layer of Earth where we live","Crust"],
q22:["Liquid layer of Earth beneath the crust","Mantle"],
q23:["Molten rock beneath Earth's surface","Magma"],
q24:["Large moving pieces of Earth's crust","Tectonic plates"],
q25:["Process where rocks break down","Weathering"],

q26:["Process engineers use to solve problems","Engineering design"],
q27:["Limits on a design","Constraints"],
q28:["Desired features of a design","Criteria"],
q29:["First working model of a solution","Prototype"],
q30:["Improving a design through repeated testing","Iteration"]
}

// Start game
function startGame(numTeams){
  teams = [];
  for(let i=0;i<numTeams;i++){ teams.push({name:teamNames[i], score:0}); }
  document.getElementById("teamSelect").style.display="none";
  document.getElementById("backBtn").style.display="inline-block";
  document.getElementById("resetBtn").style.display="inline-block";
  updateTeamScores();
  resetBoard();
}

// Update scores
function updateTeamScores(){
  document.getElementById("teamScores").innerHTML = teams.map(t=>`${t.name}: ${t.score}`).join(" | ");
}

// Reset board
function resetBoard(){
  document.querySelectorAll("td").forEach(c=>c.style.visibility="visible");
}

// Show clue
function ask(cell,id,value){
  currentValue = value;
  answer = q[id][1];
  const questionDiv = document.getElementById("question");
  questionDiv.innerHTML = q[id][0] + "<br><br><button id='showBtn' onclick='showAnswer()'>Show Answer</button>";
  questionDiv.style.display="flex";
  cell.style.visibility="hidden";
  // Hide top buttons
  document.getElementById("backBtn").style.display="none";
  document.getElementById("resetBtn").style.display="none";
}

// Show answer
function showAnswer(){
  const questionDiv=document.getElementById("question");
  const btn=document.getElementById("showBtn");
  if(btn) btn.style.display="none";

  let html="<br><br><b>"+answer+"</b><br><br><div class='team-buttons'>";
  teams.forEach((team,i)=>{ html+=`<button onclick="addPoints(${i})">${team.name} +${currentValue}</button>`; });
  html+=`<button onclick="returnToBoard()">Return to Board</button></div>`;
  questionDiv.innerHTML = html;
}

// Add points
function addPoints(index){
  teams[index].score += currentValue;
  updateTeamScores();
  returnToBoard();
}

// Return to board without points
function returnToBoard(){
  document.getElementById("question").style.display="none";
  // Show top buttons again
  document.getElementById("backBtn").style.display="inline-block";
  document.getElementById("resetBtn").style.display="inline-block";
}

// Reset game
function resetGame(){
  document.getElementById("teamSelect").style.display="flex";
  document.getElementById("question").style.display="none";
  document.getElementById("backBtn").style.display="none";
  document.getElementById("resetBtn").style.display="none";
}
</script>
</body>
</html>
