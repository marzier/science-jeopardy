<body>

<tr>

</tr>

</table>

<div id="question"></div>

<script>

let score=0
let currentValue=0
let answer=""

const q={

q1:["Genes provide instructions for making these molecules","Proteins"],
q2:["Proteins help determine an organism’s","Traits"],
q3:["A gene is a segment of","DNA"],
q4:["Genes are located on these structures","Chromosomes"],
q5:["Genes affect traits by controlling which","Proteins are produced"],

q6:["A change in the DNA sequence","Mutation"],
q7:["Mutations can change the shape of a","Protein"],
q8:["A mutation may have no effect if the","Protein does not change"],
q9:["Mutations that occur in reproductive cells can be","Inherited"],
q10:["Mutations create genetic","Variation"],

q11:["Reproduction involving one parent","Asexual reproduction"],
q12:["Reproduction involving two parents","Sexual reproduction"],
q13:["Sexual reproduction increases genetic","Variation"],
q14:["Asexual reproduction produces genetically","Identical offspring"],
q15:["Sexual reproduction produces new combinations of","Genes"],

q16:["Protein that limits muscle growth in cattle","Myostatin"],
q17:["Gene that controls myostatin production","Myostatin gene"],
q18:["Cattle with weak myostatin protein develop","Larger muscles"],
q19:["Myostatin works by limiting","Muscle growth"],
q20:["Different versions of a gene are called","Alleles"],

q21:["Humans breeding animals for desired traits","Artificial selection"],
q22:["Choosing cattle with large muscles to breed","Selective breeding"],
q23:["Selection increases the frequency of certain","Gene versions"],
q24:["Natural selection occurs without","Human involvement"],
q25:["Selection over generations changes","Populations"],

q26:["Characteristics passed from parents","Traits"],
q27:["Traits are influenced by genes and the","Environment"],
q28:["Two versions of a gene inherited from parents","Alleles"],
q29:["Combination of alleles an organism has","Genotype"],
q30:["Physical appearance of a trait","Phenotype"]

}

function ask(cell, id, value) {
    currentValue = value;
    answer = q[id][1];
    document.getElementById("question").innerHTML =
        q[id][0] + "<br><br><button onclick='showAnswer()'>Show Answer</button>";
    
    // Hide the square so it cannot be clicked again
    cell.style.visibility = "hidden";
}

function showAnswer(){

document.getElementById("question").innerHTML+="<br><br><b>"+answer+"</b><br><br><button onclick='correct()'>Correct</button><button onclick='wrong()'>Wrong</button>"

}

function correct(){
score+=currentValue
update()
}

function wrong(){
score-=currentValue
update()
}

function update(){
document.getElementById("score").innerText="Score: "+score
document.getElementById("question").innerHTML=""
}

</script>
