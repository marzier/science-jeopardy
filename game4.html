<!DOCTYPE html>
<html>
<head>
<title>Science Jeopardy – Game 4 (Genetics Review)</title>

<style>
html, body {

  margin: 0;
  padding: 0;

  background: #001f3f;
  color: white;

#teamSelect button {

  border: 1px solid black;

  vertical-align: middle;

  background: #0033cc;
}

td {
  color: #FF8C00;

}

  display: none;
  position: fixed;
  top: 0;
  left: 0;

  flex-direction: column;
  justify-content: center;

  z-index: 100;

  padding: 20px;
  box-sizing: border-box;
}

.team-buttons button, #showBtn {
  font-size: 2vw;
  margin: 5px;
  padding: 10px 20px;
  font-weight: bold;
  color: #FF8C00;
  background: #0033cc;
  border: 2px solid #FF8C00;
  border-radius: 5px;
  cursor: pointer;
}

.team-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
  gap: 10px;
}
</style>
</head>

<body>

<h1>Science Jeopardy – Genetics Review</h1>

<button id="backBtn" onclick="window.location.href='index.html'">Back to Menu</button>
<button id="resetBtn" onclick="resetGame()">Reset Game</button>

<div id="teamScores"></div>

<div id="teamSelect">
<div>Select Number of Teams</div>
<div>
<button onclick="startGame(2)">2 Teams</button>
<button onclick="startGame(3)">3 Teams</button>
<button onclick="startGame(4)">4 Teams</button>
<button onclick="startGame(5)">5 Teams</button>
<button onclick="startGame(6)">6 Teams</button>
</div>
</div>

<table>

<tr>
<th>GENES → PROTEINS</th>
<th>MUTATIONS</th>
<th>REPRODUCTION</th>
<th>MYOSTATIN</th>
<th>SELECTION</th>
<th>TRAITS</th>
</tr>

<tr>
<td onclick="ask(this,'q1',100)">$100</td>
<td onclick="ask(this,'q6',100)">$100</td>
<td onclick="ask(this,'q11',100)">$100</td>
<td onclick="ask(this,'q16',100)">$100</td>
<td onclick="ask(this,'q21',100)">$100</td>
<td onclick="ask(this,'q26',100)">$100</td>
</tr>

<tr>
<td onclick="ask(this,'q2',200)">$200</td>
<td onclick="ask(this,'q7',200)">$200</td>
<td onclick="ask(this,'q12',200)">$200</td>
<td onclick="ask(this,'q17',200)">$200</td>
<td onclick="ask(this,'q22',200)">$200</td>
<td onclick="ask(this,'q27',200)">$200</td>
</tr>

<tr>
<td onclick="ask(this,'q3',300)">$300</td>
<td onclick="ask(this,'q8',300)">$300</td>
<td onclick="ask(this,'q13',300)">$300</td>
<td onclick="ask(this,'q18',300)">$300</td>
<td onclick="ask(this,'q23',300)">$300</td>
<td onclick="ask(this,'q28',300)">$300</td>
</tr>

<tr>
<td onclick="ask(this,'q4',400)">$400</td>
<td onclick="ask(this,'q9',400)">$400</td>
<td onclick="ask(this,'q14',400)">$400</td>
<td onclick="ask(this,'q19',400)">$400</td>
<td onclick="ask(this,'q24',400)">$400</td>
<td onclick="ask(this,'q29',400)">$400</td>
</tr>

<tr>
<td onclick="ask(this,'q5',500)">$500</td>
<td onclick="ask(this,'q10',500)">$500</td>
<td onclick="ask(this,'q15',500)">$500</td>
<td onclick="ask(this,'q20',500)">$500</td>
<td onclick="ask(this,'q25',500)">$500</td>
<td onclick="ask(this,'q30',500)">$500</td>
</tr>

</table>

<div id="question"></div>

<script>

let teamNames = ["Curie","Newton","Darwin","Einstein","Tesla","Galileo"]
let teams=[]
let currentValue=0
let answer=""

const q={

q1:["Genes provide instructions for making these molecules","Proteins"],
q2:["Proteins help determine an organism’s","Traits"],
q3:["A gene is a segment of","DNA"],
q4:["Genes are located on these structures","Chromosomes"],
q5:["Genes affect traits by controlling which _____ are produced","Proteins are produced"],

q6:["A change in the DNA sequence","Mutation"],
q7:["Mutations can change the shape of a ___","Protein"],
q8:["A mutation may have no effect if the protein ____","Protein does not change"],
q9:["Mutations that occur in reproductive cells can be i______","Inherited"],
q10:["Mutations create genetic","Variation"],

q11:["Reproduction involving one parent","Asexual reproduction"],
q12:["Reproduction involving two parents","Sexual reproduction"],
q13:["Sexual reproduction increases genetic","Variation"],
q14:["Asexual reproduction produces genetically","Identical offspring"],
q15:["Sexual reproduction produces new combinations of","Genes or alleles"],

q16:["Protein that limits muscle growth in cattle","Myostatin"],
q17:["Gene that controls myostatin production","Myostatin gene"],
q18:["Cattle with weak myostatin protein develop","Larger muscles"],
q19:["Myostatin works by limiting","Muscle growth"],
q20:["Different versions of a gene are called","Alleles"],

q21:["Humans breeding animals for desired traits","Artificial selection"],
q22:["Choosing cattle with large muscles to breed","Selective breeding"],
q23:["Selection increases the frequency of certain","Gene versions"],
q24:["Natural selection occurs without","Human involvement"],
q25:["Selection over generations changes","traits or genes in Populations"],

q26:["Characteristics passed from parents","Traits"],
q27:["Traits are influenced by genes and the","Environment"],
q28:["Two versions of a gene inherited from parents","Alleles"],
q29:["Combination of alleles an organism has","Genotype"],
q30:["Physical appearance of a trait","Phenotype"]

}

function startGame(numTeams){
teams=[]
for(let i=0;i<numTeams;i++){
teams.push({name:teamNames[i],score:0})
}
document.getElementById("teamSelect").style.display="none"
document.getElementById("backBtn").style.display="inline-block"
document.getElementById("resetBtn").style.display="inline-block"
updateTeamScores()
resetBoard()
}

function updateTeamScores(){
document.getElementById("teamScores").innerHTML=
teams.map(t=>`${t.name}: ${t.score}`).join(" | ")
}

function resetBoard(){
document.querySelectorAll("td").forEach(c=>c.style.visibility="visible")
}

function ask(cell,id,value){
currentValue=value
answer=q[id][1]

const questionDiv=document.getElementById("question")

questionDiv.innerHTML=
q[id][0]+"<br><br><button id='showBtn' onclick='showAnswer()'>Show Answer</button>"

questionDiv.style.display="flex"

cell.style.visibility="hidden"

document.getElementById("backBtn").style.display="none"
document.getElementById("resetBtn").style.display="none"
}

function showAnswer(){

const questionDiv=document.getElementById("question")
const btn=document.getElementById("showBtn")
if(btn) btn.style.display="none"

let html="<br><br><b>"+answer+"</b><br><br><div class='team-buttons'>"

teams.forEach((team,i)=>{
html+=`<button onclick="addPoints(${i})">${team.name} +${currentValue}</button>`
})

html+=`<button onclick="returnToBoard()">Return to Board</button></div>`

questionDiv.innerHTML=html
}

function addPoints(index){
teams[index].score+=currentValue
updateTeamScores()
returnToBoard()
}

function returnToBoard(){
document.getElementById("question").style.display="none"
document.getElementById("backBtn").style.display="inline-block"
document.getElementById("resetBtn").style.display="inline-block"
}

function resetGame(){
document.getElementById("teamSelect").style.display="flex"
document.getElementById("question").style.display="none"
document.getElementById("backBtn").style.display="none"
document.getElementById("resetBtn").style.display="none"
}

</script>

</body>
</html>
