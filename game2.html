<!DOCTYPE html>

<html>

<head>

<style>

}

</style>

</head>

<body>

<h1>Science Jeopardy – Game 2</h1>

<a href="index.html"><button>Back to Menu</button></a>

<div id="score">Score: 0</div>

<table>

<tr>
<th>Scientific Tools</th>
<th>Matter</th>
<th>Motion</th>
<th>Energy</th>
<th>Water & Climate</th>
<th>Engineering</th>
</tr>

<tr>
<td onclick="ask(this,'q1',100)">100</td>
<td onclick="ask(this,'q6',100)">100</td>
<td onclick="ask(this,'q11',100)">100</td>
<td onclick="ask(this,'q16',100)">100</td>
<td onclick="ask(this,'q21',100)">100</td>
<td onclick="ask(this,'q26',100)">100</td>
</tr>

<tr>
<td onclick="ask(this,'q2',200)">200</td>
<td onclick="ask(this,'q7',200)">200</td>
<td onclick="ask(this,'q12',200)">200</td>
<td onclick="ask(this,'q17',200)">200</td>
<td onclick="ask(this,'q22',200)">200</td>
<td onclick="ask(this,'q27',200)">200</td>
</tr>

<tr>
<td onclick="ask(this,'q3',300)">300</td>
<td onclick="ask(this,'q8',300)">300</td>
<td onclick="ask(this,'q13',300)">300</td>
<td onclick="ask(this,'q18',300)">300</td>
<td onclick="ask(this,'q23',300)">300</td>
<td onclick="ask(this,'q28',300)">300</td>
</tr>

<tr>
<td onclick="ask(this,'q4',400)">400</td>
<td onclick="ask(this,'q9',400)">400</td>
<td onclick="ask(this,'q14',400)">400</td>
<td onclick="ask(this,'q19',400)">400</td>
<td onclick="ask(this,'q24',400)">400</td>
<td onclick="ask(this,'q29',400)">400</td>
</tr>

<tr>
<td onclick="ask(this,'q5',500)">500</td>
<td onclick="ask(this,'q10',500)">500</td>
<td onclick="ask(this,'q15',500)">500</td>
<td onclick="ask(this,'q20',500)">500</td>
<td onclick="ask(this,'q25',500)">500</td>
<td onclick="ask(this,'q30',500)">500</td>
</tr>

</table>

<div id="question"></div>

<script>

let score=0
let currentValue=0
let answer=""

const q={

q1:["Tool used to observe very small objects","Microscope"],
q2:["Tool used to measure temperature","Thermometer"],
q3:["Tool used to measure mass","Balance"],
q4:["Tool used to measure liquid volume","Graduated cylinder"],
q5:["Tool used to measure air pressure","Barometer"],

q6:["Matter that has a definite shape and volume","Solid"],
q7:["Matter that has volume but takes the shape of its container","Liquid"],
q8:["Matter with no definite shape or volume","Gas"],
q9:["Amount of matter in an object","Mass"],
q10:["Amount of space an object occupies","Volume"],

q11:["Distance divided by time","Speed"],
q12:["Speed in a specific direction","Velocity"],
q13:["Change in velocity over time","Acceleration"],
q14:["Force that slows motion between surfaces","Friction"],
q15:["Object moving at constant speed has","Balanced forces"],

q16:["Ability to do work","Energy"],
q17:["Energy stored in food","Chemical energy"],
q18:["Energy from the Sun","Solar energy"],
q19:["Energy carried by moving electrons","Electrical energy"],
q20:["Energy cannot be created or destroyed","Law of conservation of energy"],

q21:["Continuous movement of water on Earth","Water cycle"],
q22:["Water vapor cooling into liquid","Condensation"],
q23:["Liquid water turning into vapor","Evaporation"],
q24:["Water falling from clouds","Precipitation"],
q25:["Major factor influencing climate","Ocean currents"],

q26:["A possible solution to a problem","Design solution"],
q27:["Step where engineers test a design","Testing"],
q28:["Changing a design to improve it","Redesign"],
q29:["List of requirements for a solution","Design criteria"],
q30:["Step where engineers identify a problem","Define the problem"]

}

function ask(cell, id, value) {
    currentValue = value;
    answer = q[id][1];
    document.getElementById("question").innerHTML =
        q[id][0] + "<br><br><button onclick='showAnswer()'>Show Answer</button>";
    
    // Hide the square so it cannot be clicked again
    cell.style.visibility = "hidden";
}


function showAnswer(){

document.getElementById("question").innerHTML+="<br><br><b>"+answer+"</b><br><br><button onclick='correct()'>Correct</button><button onclick='wrong()'>Wrong</button>"

}

function correct(){
score+=currentValue
update()
}

function wrong(){
score-=currentValue
update()
}

function update(){
document.getElementById("score").innerText="Score: "+score
document.getElementById("question").innerHTML=""
}

</script>

</body>
</html>
